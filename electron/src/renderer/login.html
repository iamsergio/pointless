<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 style-src 'self' https://cdnjs.cloudflare.com;
                 font-src 'self' https://cdnjs.cloudflare.com;
                 script-src 'self'">
  <title>Pointless</title>
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="login-panel">
    <h1 class="app-title">Pointless</h1>

    <div class="field-group">
      <label class="field-label" for="email">Email</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-envelope input-icon"></i>
        <input id="email" type="email" placeholder="Enter your email" autocomplete="email">
      </div>
    </div>

    <div class="field-group">
      <div class="label-row">
        <label class="field-label" for="password">Password</label>
        <a class="forgot-link" href="#">Forgot Password?</a>
      </div>
      <div class="input-wrapper">
        <i class="fa-solid fa-lock input-icon"></i>
        <input id="password" type="password" placeholder="Enter your password" autocomplete="current-password">
        <button class="eye-toggle" id="eye-toggle" type="button" aria-label="Toggle password visibility">
          <i class="fa-solid fa-eye-slash" id="eye-icon"></i>
        </button>
      </div>
    </div>

    <div class="button-row">
      <button class="login-btn" id="login-btn" type="button">Login</button>
      <button class="key-btn" id="key-btn" type="button" aria-label="Use stored credentials">
        <i class="fa-solid fa-key"></i>
      </button>
    </div>

    <div class="spinner-wrapper" id="spinner-wrapper" hidden>
      <i class="fa-solid fa-rotate-right spinner"></i>
    </div>

    <p class="error-message" id="error-message" hidden></p>

    <p class="signup-row">
      Don't have an account? <a href="#">Sign Up</a>
    </p>

    <p class="offline-link" id="offline-link">Offline mode</p>
  </div>

  <script src="login.js"></script>
</body>
</html>
