name: pointless_core Rust Tests

on:
  push:
    paths:
      - 'slint/pointless_core/**'
      - '.github/workflows/core_rs.yml'
  pull_request:
    paths:
      - 'slint/pointless_core/**'
      - '.github/workflows/core_rs.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: slint/pointless_core
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: slint/pointless_core

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test --verbose
